services:

  backend:
    image: tradingspy-backend:latest
    build:
      context: ./backend
      cache_from:
        - tradingspy-backend:latest
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_AI_STUDIO_API_KEY: ${GOOGLE_AI_STUDIO_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://localhost:4000/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-google_ai_studio}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.5-flash}
      REMOTE_AGENT_AUTH_TOKEN: ${REMOTE_AGENT_AUTH_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SEARXNG_URL: http://searxng:8080
    volumes:
      - ./backend/data:/app/data
      - ./backend/modules:/app/modules
      - ./backend/main.py:/app/main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tradingspy

  frontend:
    image: tradingspy-frontend:latest
    build:
      context: ./frontend
      cache_from:
        - tradingspy-frontend:latest
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - tradingspy

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    networks:
      - tradingspy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tradingspy:
    driver: bridge
