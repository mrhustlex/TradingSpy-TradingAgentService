<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="noisy"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>

  <!-- Subtle noise texture -->
  <rect width="900" height="320" rx="16" filter="url(#noise)" opacity="0.03"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- === LEFT: Agent visual (above) === -->
  <!-- AI brain / neural network node cluster -->
  <g transform="translate(60, 30)" opacity="0.55">
    <!-- Central brain node -->
    <circle cx="60" cy="55" r="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <circle cx="60" cy="55" r="6" fill="#06b6d4" opacity="0.6"/>
    <!-- Orbiting nodes -->
    <circle cx="60" cy="15" r="4" fill="#818cf8" opacity="0.7"/>
    <circle cx="25" cy="40" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="95" cy="40" r="4" fill="#a78bfa" opacity="0.7"/>
    <circle cx="30" cy="80" r="4" fill="#818cf8" opacity="0.7"/>
    <circle cx="90" cy="80" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="60" cy="95" r="4" fill="#a78bfa" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="60" y1="37" x2="60" y2="19" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
    <line x1="44" y1="47" x2="29" y2="42" stroke="#06b6d4" stroke-width="0.8" opacity="0.5"/>
    <line x1="76" y1="47" x2="91" y2="42" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <line x1="46" y1="65" x2="34" y2="78" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
    <line x1="74" y1="65" x2="86" y2="78" stroke="#06b6d4" stroke-width="0.8" opacity="0.5"/>
    <line x1="60" y1="73" x2="60" y2="91" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
    <!-- Loop arrows around brain -->
    <path d="M35 30 A30 30 0 0 1 85 30" stroke="url(#accent)" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M85 80 A30 30 0 0 1 35 80" stroke="url(#accent)" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Tiny arrow tips -->
    <path d="M82 26 L86 30 L82 34" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M38 76 L34 80 L38 84" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Label -->
    <text x="60" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#06b6d4" font-weight="600" letter-spacing="1.5" opacity="0.7">AI AGENT</text>
  </g>

  <!-- === RIGHT: UI visual (above) === -->
  <!-- Mini dashboard mockup -->
  <g transform="translate(710, 25)" opacity="0.5">
    <!-- Dashboard frame -->
    <rect x="0" y="0" width="155" height="105" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <!-- Top bar -->
    <rect x="0" y="0" width="155" height="16" rx="8" fill="#1e293b"/>
    <rect x="0" y="8" width="155" height="8" fill="#1e293b"/>
    <circle cx="12" cy="8" r="2.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="22" cy="8" r="2.5" fill="#eab308" opacity="0.7"/>
    <circle cx="32" cy="8" r="2.5" fill="#22c55e" opacity="0.7"/>
    <text x="78" y="11" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#64748b">Market Overview</text>
    <!-- Mini heatmap inside dashboard -->
    <rect x="8" y="22" width="16" height="12" rx="2" fill="#059669" opacity="0.8"/>
    <rect x="27" y="22" width="16" height="12" rx="2" fill="#34d399" opacity="0.8"/>
    <rect x="46" y="22" width="16" height="12" rx="2" fill="#dc2626" opacity="0.8"/>
    <rect x="65" y="22" width="16" height="12" rx="2" fill="#059669" opacity="0.8"/>
    <rect x="8" y="37" width="16" height="12" rx="2" fill="#34d399" opacity="0.8"/>
    <rect x="27" y="37" width="16" height="12" rx="2" fill="#059669" opacity="0.8"/>
    <rect x="46" y="37" width="16" height="12" rx="2" fill="#34d399" opacity="0.8"/>
    <rect x="65" y="37" width="16" height="12" rx="2" fill="#dc2626" opacity="0.8"/>
    <rect x="8" y="52" width="16" height="12" rx="2" fill="#dc2626" opacity="0.8"/>
    <rect x="27" y="52" width="16" height="12" rx="2" fill="#dc2626" opacity="0.8"/>
    <rect x="46" y="52" width="16" height="12" rx="2" fill="#059669" opacity="0.8"/>
    <rect x="65" y="52" width="16" height="12" rx="2" fill="#34d399" opacity="0.8"/>
    <!-- Mini chart sparkline inside dashboard -->
    <polyline points="90,58 100,48 110,52 120,38 130,42 140,30"
              stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.8"/>
    <polyline points="90,62 100,55 110,58 120,48 130,50 140,42"
              stroke="#818cf8" stroke-width="1" fill="none" opacity="0.5" stroke-dasharray="2 2"/>
    <!-- Index tickers -->
    <text x="10" y="78" font-family="system-ui, sans-serif" font-size="6" fill="#94a3b8" font-weight="500">S&P</text>
    <text x="24" y="78" font-family="system-ui, sans-serif" font-size="6" fill="#34d399">+1.2%</text>
    <text x="50" y="78" font-family="system-ui, sans-serif" font-size="6" fill="#94a3b8" font-weight="500">QQQ</text>
    <text x="63" y="78" font-family="system-ui, sans-serif" font-size="6" fill="#34d399">+1.8%</text>
    <text x="88" y="78" font-family="system-ui, sans-serif" font-size="6" fill="#94a3b8" font-weight="500">DOW</text>
    <text x="101" y="78" font-family="system-ui, sans-serif" font-size="6" fill="#f87171">-0.3%</text>
    <!-- Watchlist row -->
    <rect x="8" y="86" width="139" height="11" rx="2" fill="#0f172a" opacity="0.6"/>
    <circle cx="14" cy="91.5" r="2" fill="#22d3ee" opacity="0.6"/>
    <text x="19" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">AAPL</text>
    <text x="34" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#94a3b8">$198.50</text>
    <text x="60" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#34d399">+0.8%</text>
    <circle cx="80" cy="91.5" r="2" fill="#818cf8" opacity="0.6"/>
    <text x="85" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#64748b">NVDA</text>
    <text x="100" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#94a3b8">$875.20</text>
    <text x="124" y="94" font-family="system-ui, sans-serif" font-size="5" fill="#34d399">+2.4%</text>
    <!-- Label -->
    <text x="78" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#818cf8" font-weight="600" letter-spacing="1.5" opacity="0.7">DASHBOARD</text>
  </g>

  <!-- === CENTER: Logo + Title === -->
  <!-- Glow backdrop -->
  <circle cx="450" cy="85" r="60" fill="#06b6d4" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Logo mark: AI brain inside chart arrow -->
  <g transform="translate(410, 45)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="40" cy="40" r="38" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <!-- Trend arrow wrapping around -->
    <path d="M15 65 Q20 50 30 42 Q40 34 55 20 Q65 12 75 15"
          stroke="url(#accent)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrow head -->
    <path d="M68 10 L78 14 L70 22" stroke="url(#accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Brain nodes inside -->
    <circle cx="35" cy="38" r="3.5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="48" cy="32" r="3.5" fill="#818cf8" opacity="0.8"/>
    <circle cx="42" cy="48" r="3.5" fill="#a78bfa" opacity="0.8"/>
    <line x1="35" y1="38" x2="48" y2="32" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <line x1="48" y1="32" x2="42" y2="48" stroke="#818cf8" stroke-width="1" opacity="0.5"/>
    <line x1="42" y1="48" x2="35" y2="38" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="155" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-1.5">
    TradingSpy
  </text>

  <!-- Accent line -->
  <rect x="360" y="167" width="180" height="2.5" rx="1.25" fill="url(#accent)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="450" y="195" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#94a3b8" letter-spacing="0.8">
    AI-Powered Trading Research  &#x2022;  Local-First  &#x2022;  Open Source
  </text>

  <!-- === BOTTOM: Feature pills === -->
  <g transform="translate(0, 250)">
    <g transform="translate(195, 0)">
      <rect x="0" y="0" width="105" height="26" rx="13" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="0.7"/>
      <text x="52.5" y="17" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#06b6d4" font-weight="600">Strategy Research</text>
    </g>
    <g transform="translate(310, 0)">
      <rect x="0" y="0" width="105" height="26" rx="13" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.25" stroke-width="0.7"/>
      <text x="52.5" y="17" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#818cf8" font-weight="600">Risk-Free Testing</text>
    </g>
    <g transform="translate(425, 0)">
      <rect x="0" y="0" width="115" height="26" rx="13" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.25" stroke-width="0.7"/>
      <text x="57.5" y="17" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#34d399" font-weight="600">Market Intelligence</text>
    </g>
    <g transform="translate(550, 0)">
      <rect x="0" y="0" width="85" height="26" rx="13" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="0.7"/>
      <text x="42.5" y="17" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" fill="#f59e0b" font-weight="600">Zero Cost</text>
    </g>
  </g>
</svg>
